services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: loanmanagement
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: base
    image: loanmanagement-app
    volumes:
      - .:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: loanmanagement
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
      CACHE_STORE: file
      SESSION_DRIVER: file
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: unless-stopped

  queue:
    build:
      context: .
      target: base
    image: loanmanagement-app
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - .:/var/www
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: loanmanagement
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      target: base
    image: loanmanagement-app
    command: php artisan schedule:work
    volumes:
      - .:/var/www
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: loanmanagement
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
